[swarm]
# Documented v1 swarm-orchestration defaults. See
# `docs/architecture.md#execution` for the contract and
# `docs/smoke-turma-run.md` for live validation.
#
# NOTE: `turma run` does NOT yet read these keys from turma.toml.
# v1 applies them as code-level defaults inside
# `default_swarm_services` (src/turma/swarm/_orchestrator.py). The
# orchestrator accepts `--max-tasks`, `--backend`, and `--dry-run` on
# the CLI; wiring the remaining keys (worker_timeout, max_retries,
# worktree_root, base_branch) through from turma.toml is a follow-up.
# The block is tracked here so the config surface stays stable as the
# loader lands.

# Which worker backend drives claimed tasks. v1 registers only
# "claude-code"; Codex / OpenCode / Gemini backends are v2 concerns.
worker_backend = "claude-code"

# Seconds before a worker is considered timed-out.
worker_timeout = 1800

# Per-task retries before the orchestrator halts the run. 0 disables
# retry. On exhaustion, the task is labelled `needs_human_review` in
# Beads and the outer loop halts so the operator can triage.
max_retries = 1

# Where per-task worktrees are created. Paths are relative to the
# repo root unless absolute. The directory is gitignored.
worktree_root = ".worktrees"

# Base branch for PRs opened by the orchestrator.
base_branch = "main"

[models]
impl_complex = "claude-opus-4-6"
spec = "claude-sonnet-4-6"
impl_codex = "codex-1"
impl = "openai/gpt-oss-120b"
test = "openai/gpt-oss-120b"
review = "openai/gpt-oss-120b"
docs = "openai/gpt-oss-20b"
boilerplate = "openai/gpt-oss-20b"

[planning]
# Planning runs an author/critic loop. Each round, the author generates
# or revises proposal/design/tasks; the critic writes a strict
# critique_N.md; the graph routes on the critic's `## Status:` token.
# A human gate at `awaiting_human_approval` must be resumed explicitly
# via `turma plan --feature <name> --resume --approve | --revise |
# --abandon | --approve --override`.

# Maximum author/critic rounds before escalation. Exhaustion and
# repeated-unresolved-blocking-ID loop detection both route to
# needs_human_review and never auto-approve.
max_rounds = 4

# When true, the graph halts at the human gate and prints the exact
# resume commands. When false, it still halts without auto-approving —
# the flag is informational today and does not change routing.
interactive = true

# Author backend runs initial generation, per-finding response, and
# revision of all three artifacts. Model prefix selects the backend:
# claude-*, gpt-*/codex-*/o*, gemini-*, or provider/model for OpenCode.
author_model = "claude-opus-4-6"
# author_model = "gemini-2.5-flash"                # Gemini CLI
# author_model = "groq/llama-3.3-70b-versatile"   # OpenCode + Groq

# Critic backend writes critique_N.md per round. Output must be in the
# strict format (`## Status: blocking | nits_only | approved`, findings
# with stable IDs `[B###]`/`[N###]`/`[Q###]`). Malformed output
# escalates to needs_human_review.
critic_model = "claude-sonnet-4-6"

[pool_limits]
impl_complex = 2
spec = 1
impl_codex = 2
impl = 3
test = 3
review = 1
docs = 4
boilerplate = 4

